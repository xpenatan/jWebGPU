name: Deploy to Google Play

on:
  workflow_dispatch:
    inputs:
      backend:
        description: "WebGPU backend"
        required: true
        default: "wgpu"
        type: choice
        options:
          - wgpu
          - dawn
      description:
        description: "Release description"
        default: "Generate release build"
      track:
        description: "Release track (internal or beta)"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - beta

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_FILE: ${{ github.workspace }}/demos/app/android/keystore.jks
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '25'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r27 (27.0.12077973)
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
          add-to-path: false
          link-to-sdk: true

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_FILE"

      - name: Download selected Android native sources
        run: >
          ./gradlew
          :webgpu:download:webgpu_download_android_x86_64_${{ inputs.backend }}
          :webgpu:download:webgpu_download_android_i686_${{ inputs.backend }}
          :webgpu:download:webgpu_download_android_armv7_${{ inputs.backend }}
          :webgpu:download:webgpu_download_android_aarch64_${{ inputs.backend }}

      - name: Build selected Android JNI natives
        run: ./gradlew :webgpu:builder:jParser_build_android_jni_${{ inputs.backend }}
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build WGPU release bundle
        if: ${{ inputs.backend == 'wgpu' }}
        run: ./gradlew :demos:app:android:bundleWgpuRelease --stacktrace

      - name: Build Dawn release bundle
        if: ${{ inputs.backend == 'dawn' }}
        run: ./gradlew :demos:app:android:bundleDawnRelease --stacktrace

      - name: Upload WGPU bundle to Play Store
        if: ${{ inputs.backend == 'wgpu' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.github.xpenatan.webgpu.demo
          releaseFiles: demos/app/android/build/outputs/bundle/wgpuRelease/android-wgpu-release.aab
          track: ${{ inputs.track }}
          status: completed

      - name: Upload Dawn bundle to Play Store
        if: ${{ inputs.backend == 'dawn' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.github.xpenatan.webgpu.demo
          releaseFiles: demos/app/android/build/outputs/bundle/dawnRelease/android-dawn-release.aab
          track: ${{ inputs.track }}
          status: completed
