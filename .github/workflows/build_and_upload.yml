name: Build and Upload

on:
  workflow_call:
    inputs:
      isRelease:
        required: true
        type: boolean
      shouldUpload:
        required: true
        type: boolean

env:
  CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
  CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
  SIGNING_KEY: ${{ secrets.PGP_SECRET }}
  SIGNING_PASSWORD: ${{ secrets.PGP_PASSPHRASE }}

jobs:
  build_windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Set up Developer Command Prompt
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Append the directory of 'vcvarsall.bat' to PATH environment variable
        uses: myci-actions/export-env-var-powershell@1
        with:
          name: PATH
          value: $env:PATH;C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build

      - name: Download sources
        run: ./gradlew :webgpu:download:webgpu_download_windows_x86_64_wgpu :webgpu:download:webgpu_download_windows_x86_64_dawn :webgpu:download:webgpu_download_glfw_windows

      - name: Build project
        run: ./gradlew :webgpu:builder:jParser_build_windows64_jni_wgpu :webgpu:builder:jParser_build_windows64_jni_dawn

      - name: Build FFM project
        run: ./gradlew :webgpu:builder:jParser_build_windows64_ffm_wgpu :webgpu:builder:jParser_build_windows64_ffm_dawn

      - name: Build TeaVM C project
        run: ./gradlew :webgpu:builder:jParser_build_windows64_teavm_c_wgpu :webgpu:builder:jParser_build_windows64_teavm_c_dawn

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: windows-natives
          path: ./webgpu/builder/build/c++/libs/

      - name: Upload Windows TeaVM C dependencies
        uses: actions/upload-artifact@v7
        with:
          name: windows-teavm-c-dependencies
          path: |
            ./webgpu/download/build/windows_x86_64/lib/wgpu_native.lib
            ./webgpu/download/build/windows_x86_64/include/
            ./webgpu/download/build/dawn-natives-windows-x64-msvc/lib/webgpu_dawn.lib
            ./webgpu/download/build/dawn-natives-windows-x64-msvc/include/

  build_linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download sources
        run: >
          ./gradlew
          :webgpu:download:webgpu_download_linux_x86_64_wgpu
          :webgpu:download:webgpu_download_glfw_windows
          :webgpu:download:webgpu_download_linux_x86_64_dawn

      - name: Build project
        run: >
          ./gradlew
          :webgpu:builder:jParser_build_linux64_jni_wgpu
          :webgpu:builder:jParser_build_linux64_jni_dawn

      - name: Build FFM project
        run: >
          ./gradlew
          :webgpu:builder:jParser_build_linux64_ffm_wgpu
          :webgpu:builder:jParser_build_linux64_ffm_dawn

      - name: Build TeaVM C project
        run: >
          ./gradlew
          :webgpu:builder:jParser_build_linux64_teavm_c_wgpu
          :webgpu:builder:jParser_build_linux64_teavm_c_dawn

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: linux-natives
          path: ./webgpu/builder/build/c++/libs/

      - name: Upload Linux TeaVM C dependencies
        uses: actions/upload-artifact@v7
        with:
          name: linux-teavm-c-dependencies
          path: |
            ./webgpu/download/build/linux_x86_64/lib/libwgpu_native.a
            ./webgpu/download/build/linux_x86_64/include/
            ./webgpu/download/build/dawn-natives-linux-x64-gcc/lib/libwebgpu_dawn.a
            ./webgpu/download/build/dawn-natives-linux-x64-gcc/include/

  build_mac:
    name: Build Mac
    runs-on: macos-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download sources
        run: >
          ./gradlew
          :webgpu:download:webgpu_download_macos_x86_64_wgpu
          :webgpu:download:webgpu_download_macos_aarch64_wgpu
          :webgpu:download:webgpu_download_glfw_windows
          :webgpu:download:webgpu_download_macos_x86_64_dawn
          :webgpu:download:webgpu_download_macos_aarch64_dawn

      - name: Build project
        run: >
          ./gradlew
          :webgpu:builder:jParser_build_mac64_jni_wgpu
          :webgpu:builder:jParser_build_mac64_jni_dawn
          :webgpu:builder:jParser_build_macArm_jni_wgpu
          :webgpu:builder:jParser_build_macArm_jni_dawn

      - name: Build FFM project
        run: >
          ./gradlew
          :webgpu:builder:jParser_build_mac64_ffm_wgpu
          :webgpu:builder:jParser_build_mac64_ffm_dawn
          :webgpu:builder:jParser_build_macArm_ffm_wgpu
          :webgpu:builder:jParser_build_macArm_ffm_dawn

      - name: Build TeaVM C project
        run: >
          ./gradlew
          :webgpu:builder:jParser_build_mac64_teavm_c_wgpu
          :webgpu:builder:jParser_build_mac64_teavm_c_dawn
          :webgpu:builder:jParser_build_macArm_teavm_c_wgpu
          :webgpu:builder:jParser_build_macArm_teavm_c_dawn

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: mac-natives
          path: ./webgpu/builder/build/c++/libs/

      - name: Upload macOS TeaVM C dependencies
        uses: actions/upload-artifact@v7
        with:
          name: mac-teavm-c-dependencies
          path: |
            ./webgpu/download/build/macos_x86_64/lib/libwgpu_native.a
            ./webgpu/download/build/macos_x86_64/include/
            ./webgpu/download/build/macos_aarch64/lib/libwgpu_native.a
            ./webgpu/download/build/macos_aarch64/include/
            ./webgpu/download/build/dawn-natives-macos-x64/lib/libwebgpu_dawn.a
            ./webgpu/download/build/dawn-natives-macos-x64/include/
            ./webgpu/download/build/dawn-natives-macos-arm64/lib/libwebgpu_dawn.a
            ./webgpu/download/build/dawn-natives-macos-arm64/include/

  build_teavm:
    name: Build TeaVM
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: 25

      - name: Install emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 6.0.3

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download sources
        run: ./gradlew :webgpu:download:webgpu_download_emdawnwebgpu

      - name: Build project
        run: ./gradlew :webgpu:builder:jParser_build_web_wasm

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: teavm-natives
          path: ./webgpu/builder/build/c++/libs/

  build_android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Install NDK r27 (27.0.12077973)
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
          add-to-path: false
          link-to-sdk: true

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Download sources
        run: >
          ./gradlew
          :webgpu:download:webgpu_download_android_x86_64_wgpu
          :webgpu:download:webgpu_download_android_i686_wgpu
          :webgpu:download:webgpu_download_android_armv7_wgpu
          :webgpu:download:webgpu_download_android_aarch64_wgpu
          :webgpu:download:webgpu_download_android_x86_64_dawn
          :webgpu:download:webgpu_download_android_i686_dawn
          :webgpu:download:webgpu_download_android_armv7_dawn
          :webgpu:download:webgpu_download_android_aarch64_dawn

      - name: Build project
        run: >
          ./gradlew
          :webgpu:builder:jParser_build_android_jni_wgpu
          :webgpu:builder:jParser_build_android_jni_dawn
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload natives
        uses: actions/upload-artifact@v7
        with:
          name: android-natives
          path: ./webgpu/builder/build/c++/libs/

  upload_natives:
    name: Upload Natives
    needs: [build_windows, build_linux, build_mac, build_android, build_teavm]
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout repository with latest changes
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git pull origin ${{ github.ref_name }}  # Pulls the latest from the branch

      - name: Get version
        uses: madhead/read-java-properties@latest
        id: version
        with:
          file: "./gradle.properties"
          property: version
          default: 0.0.1

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: 25

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Delete generated Classes
        run: ./gradlew clean

      - name: Download windows natives
        uses: actions/download-artifact@v8
        with:
          name: windows-natives
          path: ./webgpu/builder/build/c++/libs/

      - name: Download Windows TeaVM C dependencies
        uses: actions/download-artifact@v8
        with:
          name: windows-teavm-c-dependencies
          path: ./webgpu/download/build/

      - name: Download linux natives
        uses: actions/download-artifact@v8
        with:
          name: linux-natives
          path: ./webgpu/builder/build/c++/libs/

      - name: Download Linux TeaVM C dependencies
        uses: actions/download-artifact@v8
        with:
          name: linux-teavm-c-dependencies
          path: ./webgpu/download/build/

      - name: Download mac natives
        uses: actions/download-artifact@v8
        with:
          name: mac-natives
          path: ./webgpu/builder/build/c++/libs/

      - name: Download macOS TeaVM C dependencies
        uses: actions/download-artifact@v8
        with:
          name: mac-teavm-c-dependencies
          path: ./webgpu/download/build/

      - name: Download android natives
        uses: actions/download-artifact@v8
        with:
          name: android-natives
          path: ./webgpu/builder/build/c++/libs/

      - name: Download teavm natives
        uses: actions/download-artifact@v8
        with:
          name: teavm-natives
          path: ./webgpu/builder/build/c++/libs/

      - name: Generate classes
        run: ./gradlew :webgpu:builder:jParser_generate

      - name: Validate desktop TeaVM C artifacts
        run: >
          ./gradlew
          :webgpu:shared:c:jar
          :webgpu:desktop:c:nativeJar_wgpu_windows_x64
          :webgpu:desktop:c:nativeJar_dawn_windows_x64
          :webgpu:desktop:c:nativeJar_wgpu_linux_x64
          :webgpu:desktop:c:nativeJar_dawn_linux_x64
          :webgpu:desktop:c:nativeJar_wgpu_mac_x64
          :webgpu:desktop:c:nativeJar_dawn_mac_x64
          :webgpu:desktop:c:nativeJar_wgpu_mac_arm64
          :webgpu:desktop:c:nativeJar_dawn_mac_arm64

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "bot@github.com"

      - name: Commit generated code
        if: ${{ inputs.shouldUpload }}
        run: |
          git add .
          git commit -m "Commit generated code" || echo "No changes to commit"
          git push origin HEAD

      - name: Upload Release to repository
        uses: nick-fields/retry@v4
        if: ${{ inputs.shouldUpload && inputs.isRelease }}
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_on: error
          command: ./gradlew publishRelease

      - name: Upload Snapshot to repository
        uses: nick-fields/retry@v4
        if: ${{ inputs.shouldUpload && !inputs.isRelease }}
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_on: error
          command: ./gradlew publishSnapshot

      - name: Create Git tag
        uses: actions/github-script@v7
        if: ${{ inputs.isRelease }}
        with:
          script: |
            const versionOutputs = ${{ toJSON(steps.version.outputs) }};

            var version = versionOutputs.value;

            console.log("Version: " + version);

            var ref = "refs/tags/" + version
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: ref,
              sha: context.sha
            });
